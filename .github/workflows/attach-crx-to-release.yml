name: Attach CRX To Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  attach-crx:
    runs-on: ubuntu-latest
    steps:
      # Downloads the official CRX binary from the Chrome Web Store update endpoint.
      #
      # The update endpoint (clients2.google.com/service/update2/crx) is part of
      # Chrome's extension update protocol. It redirects to the actual CRX download
      # URL based on the extension ID and requested prodversion.
      #
      # Reference: https://developer.chrome.com/docs/extensions/how-to/distribute/update/
      # Stack Overflow: https://stackoverflow.com/questions/10242115/
      - name: Download CRX from Chrome Web Store
        env:
          # Allow overriding via repository variable for fork/test portability.
          EXTENSION_ID: ${{ vars.EXTENSION_ID || 'bgjillpeijfmdopfbmoinfogfhaadina' }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          # Use a high client version to avoid pinning this workflow to an aging Chrome build number.
          PROD_VERSION="9999.0.0.0"

          RELEASE_VERSION="${RELEASE_TAG#v}"
          # Allow semver suffixes like -rc.1 or +build.5 in release tags.
          RELEASE_VERSION="${RELEASE_VERSION%%[-+]*}"
          if [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            EXPECTED_CRX_VERSION="${RELEASE_VERSION}"
          elif [[ "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            EXPECTED_CRX_VERSION="${RELEASE_VERSION}.0"
          else
            echo "Unsupported release tag format for CRX version validation: ${RELEASE_TAG}"
            exit 1
          fi

          # CWS publishes can lag behind release publishing. Retry a few times before failing.
          MAX_ATTEMPTS=6
          SLEEP_SECONDS=30
          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            if ! EFFECTIVE_URL="$(curl -fLsS --get "https://clients2.google.com/service/update2/crx" \
              --data-urlencode "response=redirect" \
              --data-urlencode "prodversion=${PROD_VERSION}" \
              --data-urlencode "acceptformat=crx2,crx3" \
              --data-urlencode "x=id=${EXTENSION_ID}&uc" \
              -o New-Tab.crx \
              -w '%{url_effective}')"; then
              if [ "${attempt}" -lt "${MAX_ATTEMPTS}" ]; then
                echo "CRX download failed; retrying in ${SLEEP_SECONDS}s (${attempt}/${MAX_ATTEMPTS})"
                sleep "${SLEEP_SECONDS}"
                continue
              else
                echo "CRX download failed after ${MAX_ATTEMPTS} attempts"
                exit 1
              fi
            fi

            if [ ! -s New-Tab.crx ]; then
              echo "Downloaded CRX is empty"
              exit 1
            fi

            # CRX files are ZIP archives with a specific magic header.  Verify the
            # downloaded file is not an HTML error page (404/500) which is technically
            # non-empty but would fail silently downstream.
            if ! file New-Tab.crx | grep -qi "zip"; then
              echo "Downloaded file is not a valid CRX/ZIP archive: $(file New-Tab.crx)"
              exit 1
            fi

            CRX_FILE_NAME="$(basename "${EFFECTIVE_URL%%\?*}")"
            CRX_VERSION=""
            if [[ "${CRX_FILE_NAME}" =~ _([0-9]+(_[0-9]+){3})\.crx$ ]]; then
              CRX_VERSION="${BASH_REMATCH[1]//_/.}"
            elif [[ "${CRX_FILE_NAME}" =~ ([0-9]+\.[0-9]+\.[0-9]+\.[0-9]+)\.crx$ ]]; then
              CRX_VERSION="${BASH_REMATCH[1]}"
            fi
            if [ -z "${CRX_VERSION}" ]; then
              echo "Failed to parse CRX version from final URL: ${EFFECTIVE_URL}"
              exit 1
            fi

            if [ "${CRX_VERSION}" = "${EXPECTED_CRX_VERSION}" ]; then
              echo "Downloaded CRX version ${CRX_VERSION} matches release tag ${RELEASE_TAG}."

              # Double-check the version inside the CRX manifest to guard against
              # attaching a stale CRX whose filename happened to match an old tag.
              MANIFEST_VERSION="$(unzip -p New-Tab.crx manifest.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])" 2>/dev/null || true)"
              if [ -n "${MANIFEST_VERSION}" ] && [ "${MANIFEST_VERSION}" != "${CRX_VERSION}" ]; then
                echo "CRX manifest.json version (${MANIFEST_VERSION}) does not match URL-derived version (${CRX_VERSION}); retrying."
                sleep "${SLEEP_SECONDS}"
                continue
              fi
              echo "Manifest version ${MANIFEST_VERSION} — confirmed."
              break
            fi

            if [ "${attempt}" -lt "${MAX_ATTEMPTS}" ]; then
              echo "CRX version ${CRX_VERSION} does not match expected ${EXPECTED_CRX_VERSION}; retrying in ${SLEEP_SECONDS}s (${attempt}/${MAX_ATTEMPTS})"
              sleep "${SLEEP_SECONDS}"
            else
              echo "CRX version (${CRX_VERSION}) does not match release tag (${RELEASE_TAG} -> ${EXPECTED_CRX_VERSION}) after ${MAX_ATTEMPTS} attempts"
              exit 1
            fi
          done

      - name: Upload CRX to release
        # v2 tag pinned to immutable commit for supply-chain safety.
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: New-Tab.crx
          fail_on_unmatched_files: true
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
