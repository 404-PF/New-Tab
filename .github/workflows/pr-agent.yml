name: PR Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.head_ref }}
  cancel-in-progress: true

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    name: Run PR Agent
    if: ${{ github.event.sender.type != 'Bot' }}
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@a63d96d70556c9a496f68b2852d818633defce0a
        env:
          DEEPSEEK_KEY: ${{ secrets.DEEPSEEK_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: "true"
          GITHUB_ACTION_CONFIG.AUTO_IMPROVE: "true"
          GITHUB_ACTION_CONFIG.HANDLE_PUSH_TRIGGER: "true"
          GITHUB_ACTION_CONFIG.PUSH_COMMANDS: '["/describe", "/review", "/improve"]'
          CONFIG.MODEL: "deepseek/deepseek-v4-flash"
          CONFIG.FALLBACK_MODELS: '["deepseek/deepseek-v4-flash"]'
          CONFIG.CUSTOM_MODEL_MAX_TOKENS: "8192"
          DEEPSEEK.KEY: ${{ secrets.DEEPSEEK_KEY }}
